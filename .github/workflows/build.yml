name: Call API on Main Branch Push

on:
  push:
    branches:
      - main
  pull_request:
    types: [merged]
    branches:
      - main

jobs:
  call-api:
    runs-on: ubuntu-latest
    steps:
         
      - name: Call API
        env:
          USER_EMAIL: "${{ github.actor }}"
        run: |
          RESPONSE=$(curl -s -X GET \
            "https://stock-build-3.mostcreativeworld.com/build-my-site-out/site/stock-ui-dev.mostcreativeworld.com?user=$USER_EMAIL")
          
          STATUS=$(echo "$RESPONSE" | jq '.status')
          MESSAGE=$(echo "$RESPONSE" | jq -r '.message')
          
          echo "API Response Status: $STATUS"
          echo "API Response Message: $MESSAGE"
          
          if [ "$STATUS" != "1" ]; then
            echo "API call failed with status $STATUS"
            exit 1
          fi
            
          echo "API call completed successfully"
